kind = "web"
previewPath = "/"
title = "DN. Maria - Alho Triturado"
version = "1.0.0"
id = "artifacts/dn-maria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18429

[services.development]
run = "pnpm --filter @workspace/dn-maria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dn-maria", "run", "build" ]
publicDir = "artifacts/dn-maria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18429"
BASE_PATH = "/"
